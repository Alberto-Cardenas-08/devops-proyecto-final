name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r docker/requirements.txt

      - name: Test Flask application
        run: |
          python -c "from docker.app import app; print('✅ Flask app imported successfully')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Zip application and upload to S3
        run: |
          zip -r mi-app.zip docker/
          aws s3 cp mi-app.zip s3://mi-pipeline-source-${{ secrets.AWS_ACCOUNT_ID }}/mi-app.zip

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=devops-ec2-cloudformation" \
            --parameters '{"commands":["cd /home/ec2-user && aws s3 cp s3://mi-pipeline-source-${{ secrets.AWS_ACCOUNT_ID }}/mi-app.zip . && unzip -o mi-app.zip && sudo docker restart web"]}' \
            --region us-east-1
